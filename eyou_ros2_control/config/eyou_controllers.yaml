controller_manager:
  ros__parameters:
    update_rate: 50  # 与硬件读写频率匹配

    # 发布所有关节实时位置
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # 左臂轨迹控制器 joint1~6
    left_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # 右臂轨迹控制器 joint7~12
    right_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

# 显式指定顺序，避免默认的接口字典序（joint1, joint10, ...）。
joint_state_broadcaster:
  ros__parameters:
    joints: [joint1, joint2, joint3, joint4, joint5, joint6,
             joint7, joint8, joint9, joint10, joint11, joint12]
    interfaces: [position, velocity, effort]

# 左臂控制器参数
left_arm_controller:
  ros__parameters:
    joints: [joint1, joint2, joint3, joint4, joint5, joint6]
    command_interfaces: [position]
    state_interfaces: [position]
    gains:
      joint1: {p: 200.0, i: 0.0, d: 10.0}
      joint2: {p: 200.0, i: 0.0, d: 10.0}
      joint3: {p: 200.0, i: 0.0, d: 10.0}
      joint4: {p: 150.0, i: 0.0, d: 8.0}
      joint5: {p: 150.0, i: 0.0, d: 8.0}
      joint6: {p: 100.0, i: 0.0, d: 5.0}

# 右臂控制器参数
right_arm_controller:
  ros__parameters:
    joints: [joint7, joint8, joint9, joint10, joint11, joint12]
    command_interfaces: [position]
    state_interfaces: [position]
    gains:
      joint7: {p: 200.0, i: 0.0, d: 10.0}
      joint8: {p: 200.0, i: 0.0, d: 10.0}
      joint9: {p: 200.0, i: 0.0, d: 10.0}
      joint10: {p: 150.0, i: 0.0, d: 8.0}
      joint11: {p: 150.0, i: 0.0, d: 8.0}
      joint12: {p: 100.0, i: 0.0, d: 5.0}
